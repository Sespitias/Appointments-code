steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/appointment-pipeline:$COMMIT_SHA', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/appointment-pipeline:$COMMIT_SHA']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'jobs'
      - 'update'
      - 'appointment-pipeline'
      - '--region'
      - '${_REGION}'
      - '--image'
      - 'gcr.io/$PROJECT_ID/appointment-pipeline:$COMMIT_SHA'

images:
  - 'gcr.io/$PROJECT_ID/appointment-pipeline:$COMMIT_SHA'

substitutions:
  _REGION: 'us-central1'

options:
  logging: CLOUD_LOGGING_ONLY
